<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product – Thoppil Jewellery</title>
  <meta name="description" content="Premium handcrafted jewellery from Thoppil Jewellery, Kottayam Kerala."/>
  <meta name="robots" content="index, follow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
  <style>
    :root{--gold:#c9a96e;--bg:#0d0b08;--bg-2:#13100c;--bg-3:#1c1710;--text:#f0ead8;--text-muted:#9a9080;--border:rgba(201,169,110,0.18);--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Raleway',sans-serif;--ease-out-quint:cubic-bezier(0.22,1,0.36,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-weight:300;overflow-x:hidden}
    #navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;background:rgba(13,11,8,.92);backdrop-filter:blur(12px)}
    .nav-inner{max-width:1280px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
    .nav-logo{font-family:var(--font-serif);font-size:1.4rem;font-weight:600;letter-spacing:.2em;color:var(--text);text-decoration:none}
    .logo-t{color:var(--gold)}
    .prod-detail-skeleton{max-width:1280px;margin:100px auto 0;padding:3rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem}
    .pds-main{aspect-ratio:1;background:var(--bg-3)}
  </style>
  <link rel="stylesheet" href="/css/style.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="/css/product.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/product.css"></noscript>
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="logo-t">T</span>HOPPIL</a>
    <ul class="nav-links">
      <li><a href="/#collections">Collections</a></li>
      <li><a href="/#heritage">Heritage</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
    
    <button class="nav-mobile-toggle" id="mobileToggle">☰</button>
  </div>
  <div class="nav-mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/#collections">Collections</a>
    <a href="/#contact">Contact</a>
  </div>
</nav>

<!-- SKELETON LOADER -->
<div id="productSkeleton" class="prod-detail-skeleton">
  <div class="pds-left"><div class="pds-main"></div><div class="pds-thumbs"><span></span><span></span><span></span></div></div>
  <div class="pds-right"><div class="pds-line wide"></div><div class="pds-line"></div><div class="pds-line short"></div><div class="pds-line"></div><div class="pds-line short"></div></div>
</div>

<!-- PRODUCT DETAIL -->
<div id="productDetail" style="display:none">

  <!-- Breadcrumb -->
  <div class="prod-breadcrumb">
    <div class="prod-breadcrumb-inner">
      <a href="/">Home</a><span>◈</span>
      <a href="/#collections">Collections</a><span>◈</span>
      <a href="#" id="prodBreadCat"></a><span>◈</span>
      <span id="prodBreadName"></span>
    </div>
  </div>

  <!-- Main Section -->
  <section class="prod-main">
    <div class="prod-main-inner">

      <!-- LEFT: Gallery -->
      <div class="prod-gallery">
        <div class="prod-main-img-wrap" id="mainImgWrap">
          <img class="prod-main-img" id="mainImg" src="" alt=""/>
          <div class="prod-zoom-hint">Hover to zoom</div>
          <div class="prod-zoom-lens" id="zoomLens"></div>
        </div>
        <div class="prod-thumbs" id="prodThumbs"></div>
      </div>

      <!-- RIGHT: Info -->
      <div class="prod-info">
        <span class="prod-cat-tag" id="prodCatTag"></span>
        <h1 class="prod-title" id="prodTitle"></h1>
        <div class="prod-status-row">
          <span class="prod-stock" id="prodStock"></span>
        </div>
        <div class="prod-price" id="prodPrice"></div>
        <p class="prod-price-note">💡 Price varies with current gold rate. Contact us for exact pricing.</p>

        <div class="prod-specs">
          <div class="prod-spec" id="specPurity">
            <span class="spec-label">Gold Purity</span>
            <span class="spec-val" id="prodPurity"></span>
          </div>
          <div class="prod-spec" id="specWeight">
            <span class="spec-label">Weight</span>
            <span class="spec-val" id="prodWeight"></span>
          </div>
          <div class="prod-spec" id="specStone">
            <span class="spec-label">Stone Type</span>
            <span class="spec-val" id="prodStone"></span>
          </div>
        </div>

        <div class="prod-desc-section">
          <h3>Description</h3>
          <p id="prodDesc"></p>
        </div>

        <div class="prod-actions">
          <a href="#" class="btn-primary prod-enquire-btn" id="whatsappBtn" target="_blank">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right:.5rem"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Enquire on WhatsApp
          </a>
          <a href="/#contact" class="btn-ghost">Send Enquiry Form</a>
        </div>
      </div>
    </div>
  </section>

</div>

<!-- Related Products — full width below product detail -->
<section class="related-section" id="relatedSection" style="display:none">
  <div class="related-inner">
    <div class="related-header">
      <div class="related-tag">You May Also Like</div>
      <h2 class="related-title">Related <em>Pieces</em></h2>
    </div>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</section>

<!-- WhatsApp float -->
<a href="https://wa.me/919999900000" class="whatsapp-float" target="_blank">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script src="/js/product.js"></script>
</body>
</html>
